##### Prefix #####

# Change prefix from Ctrl+b to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Numbering #####

# Start windows at 1 instead of 0
set -g base-index 1

# Start panes at 1 instead of 0
set -g pane-base-index 1

# Renumber windows after one is closed
set -g renumber-windows on

##### Usability #####

# Enable mouse support
set -g mouse on

# Use vim keys in copy mode
setw -g mode-keys vi

# Reduce Escape delay (better with Neovim)
set -sg escape-time 10

##### Appearance #####

# Status bar
set -g status-style bg=black,fg=white

##### Plugins #####

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Save & restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-save and auto-restore
set -g @plugin 'tmux-plugins/tmux-continuum'

# Enable automatic restore
set -g @continuum-restore 'on'

##### Pane Navigation #####

# Move between panes using Vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Window Navigation #####

# Previous / Next window
bind H previous-window
bind L next-window

# Toggle to last window
bind Tab last-window

##### Splits #####

# Split and keep the current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### Join / Unjoin Panes #####

# Join any tmux window as a right split
bind J command-prompt -p "Join window:" "join-pane -h -s :%%"

# Join any tmux window as a bottom split
bind K command-prompt -p "Join window:" "join-pane -v -s :%%"

# Move the focused pane back into its own window
bind B break-pane -d

##### Reload Config #####

# Reload tmux config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

##### Status Bar #####

set -g status on
set -g status-position bottom
set -g status-interval 5

# Background
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left side
set -g status-left-length 30
set -g status-left "#[fg=#89b4fa,bold] #S "

# Right side
set -g status-right-length 80
set -g status-right "#[fg=#a6e3a1]%Y-%m-%d #[fg=#f9e2af]%H:%M "

##### Windows #####

# Inactive windows
setw -g window-status-format " #I:#W "

# Active window
setw -g window-status-current-format "#[bg=#89b4fa,fg=#1e1e2e,bold] #I:#W "

# Window separator
set -g window-status-separator " "

# Activity indicator
setw -g window-status-activity-style "fg=#f38ba8,bold"



#Automatic rename off
set-option -g automatic-rename off
set-option -g allow-rename off

##### TPM #####

# Keep this at the very end
run '~/.tmux/plugins/tpm/tpm'
